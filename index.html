<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Diary</title>
    
    <meta name="theme-color" content="#121212">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GymDiary">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2936/2936886.png">
    
    <link rel="manifest" href='data:application/json,{"name":"Gym Diary","short_name":"GymDiary","start_url":"/","scope":"/","display":"standalone","display_override":["standalone","fullscreen"],"orientation":"portrait","background_color":"#121212","theme_color":"#121212","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/2936/2936886.png","sizes":"512x512","type":"image/png","purpose":"any maskable"}]}'>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212; 
            --surface-color: #1c1c1e; 
            --surface-lighter: #2c2c2e; 
            --text-primary: #ffffff; 
            --text-secondary: #aaaaaa; 
            --text-muted: #666666; 
            --border-color: #2c2c2e;
            --btn-save-bg: #f2f2f7; 
            --btn-save-text: #000000;
            
            /* Кнопки теперь #181818: они заметны на фоне #121212, но темнее карточек #1c1c1e */
            --control-bg: #181818; 
            
            --active-var-bg: #3a3a3c;
            --active-var-text: #ffffff;
            --radius-xl: 16px; 
            --radius-md: 10px;
        }

        [data-theme="light"] {
            --bg-color: #f2f2f2; 
            --surface-color: #ffffff; 
            --surface-lighter: #f2f2f7; 
            --text-primary: #000000; 
            --text-secondary: #666666; 
            --text-muted: #aaaaaa; 
            --border-color: #f2f2f7;
            --btn-save-bg: #111111;
            --btn-save-text: #ffffff;
            --control-bg: #e5e5ea;
            --active-var-bg: #8e8e93;
            --active-var-text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; border: none; outline: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0; padding: 0;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease;
            display: flex; justify-content: center;
            -webkit-user-select: none; user-select: none;
            padding-top: env(safe-area-inset-top);
        }

        .app-container {
            width: 100%; max-width: 600px; min-height: 100vh;
            padding: 16px;
            padding-bottom: max(100px, env(safe-area-inset-bottom));
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-top: 8px; }
        h1 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .theme-toggle { background: none; color: var(--text-primary); cursor: pointer; padding: 8px; display: flex; }

        .tabs { display: flex; background: var(--surface-color); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px 0; font-size: 14px; font-weight: 600; color: var(--text-muted); border-radius: 9px; cursor: pointer; }
        .tab.active { background: var(--surface-lighter); color: var(--text-primary); }

        .card { background: var(--surface-color); border-radius: var(--radius-xl); margin-bottom: 16px; overflow: hidden; }
        .card-header { padding: 18px 16px; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px; cursor: pointer; }
        .health-left { display: flex; flex-direction: column; gap: 4px; }
        .title { font-size: 16px; font-weight: 700; line-height: 1.2; }
        .variation-sub { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; }
        .warmup-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
        .weight-value { font-size: 26px; font-weight: 800; line-height: 1; white-space: nowrap; }
        .weight-unit { font-size: 15px; font-weight: 600; color: var(--text-secondary); margin-left: 2px; }

        .card-body { display: none; padding: 12px 16px 16px 16px; border-top: 1px solid var(--border-color); }
        .card.expanded .card-body { display: block; }

        .var-selector { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 8px; scrollbar-width: none; }
        .var-chip { padding: 8px 14px; background: var(--surface-lighter); border-radius: 20px; font-size: 12px; font-weight: 700; color: var(--text-muted); white-space: nowrap; cursor: pointer; transition: all 0.2s ease; }
        .var-chip.active { background: var(--active-var-bg); color: var(--active-var-text); }
        .var-add { background: var(--control-bg); color: var(--text-secondary); padding: 8px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; }

        input { width: 100%; background: none; color: var(--text-primary); font-size: 18px; font-weight: 700; padding: 0; -webkit-user-select: text; user-select: text;}

        .btn-save { width: 100%; background: var(--btn-save-bg); color: var(--btn-save-text); padding: 16px; border-radius: 12px; font-size: 14px; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-bottom: 16px; transition: opacity 0.2s; }

        .photo-section { margin-top: 8px; border-top: 1px solid var(--border-color); padding-top: 16px; }
        .photo-container { position: relative; border-radius: var(--radius-md); overflow: hidden; background: var(--bg-color); width: 100%; display: flex; align-items: center; justify-content: center; }
        .photo-container.has-photo { height: 200px; margin-bottom: 12px; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .photo-btn { font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; padding: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: var(--surface-lighter); border-radius: var(--radius-md); margin-bottom: 12px; }
        .photo-remove { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #fff; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .bottom-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .action-link-btn { background: var(--control-bg); color: var(--text-secondary); padding: 12px; border-radius: var(--radius-md); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; font-weight: 600; }

        /* Footer Сетка */
        .footer-controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr 3fr; 
            gap: 8px; 
            margin-top: 24px; 
        }
        .btn-control { 
            background: var(--control-bg); 
            color: var(--text-primary); 
            padding: 14px 4px; 
            border-radius: 12px; 
            font-size: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 6px; 
            transition: background 0.2s ease; 
        }
        .btn-control:active { background: var(--surface-lighter); }
        .btn-control span { display: none; } 
        .btn-control.btn-add-main span { display: inline; } 

        .icon { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        
        #importFile { display: none; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--surface-color); width: 100%; max-width: 300px; border-radius: 20px; overflow: hidden; }
        .modal-btn { width: 100%; padding: 18px; text-align: center; font-size: 16px; font-weight: 600; color: var(--text-primary); cursor: pointer; border-bottom: 1px solid var(--border-color); }
        .modal-btn.danger { color: #ff3b30; }
        .modal-btn:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>Gym Diary</h1>
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn"></button>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchWorkout('A', this)">Workout A</div>
            <div class="tab" onclick="switchWorkout('B', this)">Workout B</div>
        </div>

        <div id="app-content"></div>
        
        <div class="footer-controls">
            <button class="btn-control" onclick="exportToFile()" title="Export">
                <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            </button>
            <button class="btn-control" onclick="document.getElementById('importFile').click()" title="Import">
                <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            </button>
            <button class="btn-control btn-add-main" onclick="addExercise()">
                <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                <span>Add Exercise</span>
            </button>
        </div>
        <input type="file" id="importFile" accept=".json" onchange="importFromFile(event)">
    </div>

    <div class="modal-overlay" id="var-modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-btn" id="modal-rename-btn">Rename Variation</div>
            <div class="modal-btn danger" id="modal-delete-btn">Delete Variation</div>
            <div class="modal-btn" style="color: var(--text-muted)" onclick="closeModal()">Cancel</div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,' + encodeURIComponent('self.addEventListener("fetch", (e) => { e.respondWith(fetch(e.request)); }); self.addEventListener("install", (e) => { self.skipWaiting(); });'))
            .then(reg => reg.update());
        }

        const iconSun = `<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
        const iconMoon = `<svg class="icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

        let workouts = JSON.parse(localStorage.getItem('customWorkouts')) || { 'A': [{ name: "Dumbbell Press", variations: ["Default"] }], 'B': [] };
        let exercisePhotos = JSON.parse(localStorage.getItem('exercisePhotos')) || {}; 
        let activeVars = JSON.parse(localStorage.getItem('activeVars')) || {}; 
        let currentWorkout = 'A';
        let expandedCardId = null;
        let pressTimer;

        function initTheme() {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            document.getElementById('theme-btn').innerHTML = saved === 'light' ? iconMoon : iconSun;
        }

        function toggleTheme() {
            const cur = document.documentElement.getAttribute('data-theme');
            const next = cur === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('theme-btn').innerHTML = next === 'light' ? iconMoon : iconSun;
        }

        function switchWorkout(type, el) {
            currentWorkout = type;
            expandedCardId = null;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function toggleCard(id) {
            expandedCardId = (expandedCardId === id) ? null : id;
            render();
        }

        function handleVarTouchStart(exIdx, v, e) {
            pressTimer = window.setTimeout(() => openVarModal(exIdx, v), 600);
        }

        function handleVarTouchEnd() { clearTimeout(pressTimer); }

        function selectVariation(exIndex, varName, e) {
            if(e) e.stopPropagation();
            const exName = workouts[currentWorkout][exIndex].name;
            activeVars[exName] = varName;
            localStorage.setItem('activeVars', JSON.stringify(activeVars));
            render();
        }

        function openVarModal(exIdx, vName) {
            const modal = document.getElementById('var-modal');
            modal.style.display = 'flex';
            document.getElementById('modal-rename-btn').onclick = () => {
                const newName = prompt("Rename:", vName);
                if (newName && newName !== vName) {
                    const ex = workouts[currentWorkout][exIdx];
                    const vIdx = ex.variations.indexOf(vName);
                    ex.variations[vIdx] = newName;
                    if (exercisePhotos[`${ex.name}|${vName}`]) {
                        exercisePhotos[`${ex.name}|${newName}`] = exercisePhotos[`${ex.name}|${vName}`];
                        delete exercisePhotos[`${ex.name}|${vName}`];
                    }
                    if (activeVars[ex.name] === vName) activeVars[ex.name] = newName;
                    saveState();
                }
                closeModal();
            };
            document.getElementById('modal-delete-btn').onclick = () => {
                if (confirm(`Delete "${vName}"?`)) {
                    const ex = workouts[currentWorkout][exIdx];
                    ex.variations = ex.variations.filter(v => v !== vName);
                    if (ex.variations.length === 0) ex.variations = ["Default"];
                    delete exercisePhotos[`${ex.name}|${vName}`];
                    activeVars[ex.name] = ex.variations[0];
                    saveState();
                }
                closeModal();
            };
        }

        function closeModal() { document.getElementById('var-modal').style.display = 'none'; }

        function addVariation(exIndex, e) {
            if(e) e.stopPropagation();
            const name = prompt("Variation name:");
            if (name) {
                if (!workouts[currentWorkout][exIndex].variations) workouts[currentWorkout][exIndex].variations = ["Default"];
                workouts[currentWorkout][exIndex].variations.push(name);
                selectVariation(exIndex, name);
                saveState();
            }
        }

        async function uploadPhoto(exName, varName) {
            const key = `${exName}|${varName}`;
            const input = document.createElement('input');
            input.type = 'file'; input.accept = 'image/*';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = ev => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height, max = 800;
                        if (w > h) { if (w > max) { h *= max/w; w = max; } } else { if (h > max) { w *= max/h; h = max; } }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        exercisePhotos[key] = canvas.toDataURL('image/jpeg', 0.6);
                        localStorage.setItem('exercisePhotos', JSON.stringify(exercisePhotos));
                        render();
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function render() {
            const container = document.getElementById('app-content');
            container.innerHTML = '';
            const history = JSON.parse(localStorage.getItem('gymHistory2')) || [];

            workouts[currentWorkout].forEach((ex, index) => {
                const variations = ex.variations || ["Default"];
                const curVar = activeVars[ex.name] || variations[0];
                const last = history.find(e => e.exercise === ex.name && e.variation === curVar);
                const photoKey = `${ex.name}|${curVar}`;
                const photo = exercisePhotos[photoKey];
                const isExpanded = (expandedCardId === index);
                
                const card = document.createElement('div');
                card.className = `card ${isExpanded ? 'expanded' : ''}`;
                card.innerHTML = `
                    <div class="card-header" onclick="toggleCard(${index})">
                        <div class="health-left">
                            <div class="variation-sub">${curVar}</div>
                            <div class="title">${ex.name}</div>
                            <div class="warmup-label">${last?.warmup ? `Warmup: <b>${last.warmup}</b>` : 'Warmup: --'}</div>
                        </div>
                        <div class="health-right">
                            <div class="weight-value">${last?.weight || '--'}<span class="weight-unit">kg</span></div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="var-selector">
                            ${variations.map(v => `
                                <div class="var-chip ${v === curVar ? 'active' : ''}" 
                                     onclick="selectVariation(${index}, '${v}', event)"
                                     onmousedown="handleVarTouchStart(${index}, '${v}', event)"
                                     onmouseup="handleVarTouchEnd()"
                                     ontouchstart="handleVarTouchStart(${index}, '${v}', event)"
                                     ontouchend="handleVarTouchEnd()">
                                     ${v}
                                </div>`).join('')}
                            <div class="var-add" onclick="addVariation(${index}, event)">+ Var</div>
                        </div>

                        <div class="input-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
                            <div style="background: var(--surface-lighter); border-radius: 10px; padding: 10px 14px;"><label style="display: block; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px;">Working</label><input type="text" id="w-${index}" inputmode="decimal" placeholder="0" style="width: 100%; background: none; color: var(--text-primary); font-size: 18px; font-weight: 700; padding: 0;"></div>
                            <div style="background: var(--surface-lighter); border-radius: 10px; padding: 10px 14px;"><label style="display: block; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px;">Warmup</label><input type="text" id="rm-${index}" inputmode="decimal" placeholder="0" style="width: 100%; background: none; color: var(--text-primary); font-size: 18px; font-weight: 700; padding: 0;"></div>
                        </div>
                        <button class="btn-save" onclick="saveExercise('${ex.name}', '${curVar}', 'w-${index}', 'rm-${index}')">Save</button>

                        <div class="photo-section">
                            ${!photo ? `<div class="photo-btn" onclick="uploadPhoto('${ex.name}', '${curVar}')">Photo for ${curVar}</div>` : ''}
                            <div class="photo-container ${photo ? 'has-photo' : ''}">
                                ${photo ? `<img src="${photo}"><button class="photo-remove" onclick="removePhoto('${ex.name}', '${curVar}', event)">✕</button>` : ''}
                            </div>
                            <div class="bottom-actions">
                                <button class="action-link-btn" onclick="editEx(${index}, event)">Rename</button>
                                <button class="action-link-btn" onclick="deleteEx(${index}, event)">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function saveExercise(name, curVar, wId, rmId) {
            const w = document.getElementById(wId).value.trim();
            const rm = document.getElementById(rmId).value.trim();
            if (!w && !rm) return;
            const h = JSON.parse(localStorage.getItem('gymHistory2')) || [];
            h.unshift({ exercise: name, variation: curVar, weight: w || '-', warmup: rm || '-', date: new Date().toLocaleDateString() });
            localStorage.setItem('gymHistory2', JSON.stringify(h));
            render();
        }

        function addExercise() { const n = prompt("Exercise Name:"); if (n) { workouts[currentWorkout].push({ name: n, variations: ["Default"] }); saveState(); } }
        function editEx(i, e) { e.stopPropagation(); const old = workouts[currentWorkout][i].name; const n = prompt("New Name:", old); if (n) { workouts[currentWorkout][i].name = n; saveState(); } }
        function deleteEx(i, e) { e.stopPropagation(); if (confirm("Delete?")) { workouts[currentWorkout].splice(i, 1); saveState(); } }
        function removePhoto(ex, vr, e) { e.stopPropagation(); delete exercisePhotos[`${ex}|${vr}`]; localStorage.setItem('exercisePhotos', JSON.stringify(exercisePhotos)); render(); }
        function saveState() { 
            localStorage.setItem('customWorkouts', JSON.stringify(workouts)); 
            localStorage.setItem('activeVars', JSON.stringify(activeVars));
            render(); 
        }
        function exportToFile() { const d = { h: localStorage.getItem('gymHistory2'), w: localStorage.getItem('customWorkouts'), p: localStorage.getItem('exercisePhotos'), a: localStorage.getItem('activeVars') }; const blob = new Blob([JSON.stringify(d)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `gym_backup.json`; a.click(); }
        function importFromFile(e) { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => { const d = JSON.parse(ev.target.result); if (d.h) localStorage.setItem('gymHistory2', d.h); if (d.w) localStorage.setItem('customWorkouts', typeof d.w === 'string' ? JSON.parse(d.w) : d.w); if (d.p) localStorage.setItem('exercisePhotos', d.p); if (d.a) localStorage.setItem('activeVars', d.a); location.reload(); }; r.readAsText(f); }
        initTheme(); render();
    </script>
</body>
</html>
