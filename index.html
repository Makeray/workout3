<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Diary</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2936/2936886.png">
    
    <link rel="manifest" href='data:application/json,{"name":"Gym Diary","short_name":"GymDiary","start_url":"/","display":"standalone","background_color":"#000000","theme_color":"#000000","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/2936/2936886.png","sizes":"512x512","type":"image/png"}]}'>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000; 
            --surface-color: #1c1c1e; 
            --surface-lighter: #2c2c2e; 
            --text-primary: #ffffff; 
            --text-secondary: #aaaaaa; 
            --text-muted: #666666; 
            --border-color: #2c2c2e;
            --btn-save-bg: #f2f2f7; 
            --btn-save-text: #000000;
            --radius-xl: 16px; 
            --radius-md: 10px;
        }

        [data-theme="light"] {
            --bg-color: #f2f2f2; 
            --surface-color: #ffffff; 
            --surface-lighter: #e8e8e8; 
            --text-primary: #000000; 
            --text-secondary: #666666; 
            --text-muted: #aaaaaa; 
            --border-color: #f2f2f7;
            --btn-save-bg: #111111;
            --btn-save-text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; border: none; outline: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: max(24px, env(safe-area-inset-top)) 16px max(80px, env(safe-area-inset-bottom));
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease;
        }

        .icon { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .icon-sm { width: 14px; height: 14px; stroke-width: 2.5; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h1 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        
        .theme-toggle { background: none; color: var(--text-primary); cursor: pointer; padding: 8px; display: flex; align-items: center; }

        .tabs { display: flex; background: var(--surface-color); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
        .tab { flex: 1; text-align: center; padding: 10px 0; font-size: 14px; font-weight: 600; color: var(--text-muted); border-radius: 9px; cursor: pointer; }
        .tab.active { background: var(--surface-lighter); color: var(--text-primary); }

        .card { background: var(--surface-color); border-radius: var(--radius-xl); margin-bottom: 16px; overflow: hidden; }

        .card-header { padding: 18px 16px; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px; cursor: pointer; }
        .health-left { display: flex; flex-direction: column; gap: 4px; }
        .title { font-size: 16px; font-weight: 700; line-height: 1.2; }
        .warmup-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
        .warmup-label b { color: var(--text-primary); }
        .weight-value { font-size: 26px; font-weight: 800; line-height: 1; white-space: nowrap; }
        .weight-unit { font-size: 15px; font-weight: 600; color: var(--text-secondary); margin-left: 2px; }

        .card-body { display: none; padding: 12px 16px 16px 16px; border-top: 1px solid var(--border-color); }
        .card.expanded .card-body { display: block; }

        .card-top-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .action-link { background: none; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 4px 0; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .input-wrapper { position: relative; background: var(--surface-lighter); border-radius: var(--radius-md); padding: 10px 14px; }
        .input-wrapper label { display: block; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        input { width: 100%; background: none; color: var(--text-primary); font-size: 18px; font-weight: 700; padding: 0; }

        .btn-save { width: 100%; background: var(--btn-save-bg); color: var(--btn-save-text); padding: 18px; border-radius: 12px; font-size: 14px; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-bottom: 16px; }

        .photo-section { margin-top: 8px; border-top: 1px solid var(--border-color); padding-top: 16px; }
        .photo-container { position: relative; border-radius: var(--radius-md); overflow: hidden; background: var(--bg-color); width: 100%; }
        .photo-container img { width: 100%; display: block; object-fit: cover; max-height: 250px; }
        .photo-btn { font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; padding: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: var(--surface-lighter); border-radius: var(--radius-md); }
        .photo-remove { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #fff; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .btn-add { width: 100%; background: var(--surface-color); color: var(--text-secondary); padding: 18px; border-radius: var(--radius-xl); font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 20px; text-align: center; display: block; }
        .data-controls { display: flex; gap: 10px; margin-top: 20px; }
        .btn-data { flex: 1; background: var(--surface-color); color: var(--text-secondary); padding: 14px; border-radius: var(--radius-md); font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        #importFile { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Gym Diary</h1>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn"></button>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchWorkout('A', this)">Тренировка А</div>
        <div class="tab" onclick="switchWorkout('B', this)">Тренировка Б</div>
    </div>

    <div id="app-content"></div>
    
    <button class="btn-add" onclick="addExercise()">+ Добавить упражнение</button>

    <div class="data-controls">
        <button class="btn-data" onclick="exportToFile()">
            <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            Экспорт
        </button>
        <button class="btn-data" onclick="document.getElementById('importFile').click()">
            <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            Импорт
        </button>
    </div>
    <input type="file" id="importFile" accept=".json" onchange="importFromFile(event)">

    <script>
        // Service Worker (улучшен для Vercel)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
                    self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => {})));
                `;
                const blob = new Blob([swCode], {type: 'text/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(err => console.log('SW error', err));
            });
        }

        const iconEdit = `<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
        const iconTrash = `<svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`;
        const iconPhoto = `<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`;
        const iconSun = `<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
        const iconMoon = `<svg class="icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

        let workouts = JSON.parse(localStorage.getItem('customWorkouts')) || { 'A': [{ name: "Жим гантелей" }], 'B': [{ name: "Жим в Хаммере" }] };
        let exercisePhotos = JSON.parse(localStorage.getItem('exercisePhotos')) || {};
        let currentWorkout = 'A';

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('theme-btn').innerHTML = savedTheme === 'light' ? iconMoon : iconSun;
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('theme-btn').innerHTML = newTheme === 'light' ? iconMoon : iconSun;
        }

        function switchWorkout(type, el) {
            currentWorkout = type;
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function toggleCard(index) {
            const card = document.getElementById(`card-${index}`);
            const expanded = card.classList.contains('expanded');
            document.querySelectorAll('.card').forEach(c => c.classList.remove('expanded'));
            if (!expanded) card.classList.add('expanded');
        }

        async function uploadPhoto(exerciseName) {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = 'image/*';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height, max = 800;
                        if (w > h) { if (w > max) { h *= max/w; w = max; } } else { if (h > max) { w *= max/h; h = max; } }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        exercisePhotos[exerciseName] = canvas.toDataURL('image/jpeg', 0.6);
                        localStorage.setItem('exercisePhotos', JSON.stringify(exercisePhotos));
                        render();
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function render() {
            const container = document.getElementById('app-content');
            container.innerHTML = '';
            const history = JSON.parse(localStorage.getItem('gymHistory2')) || [];

            workouts[currentWorkout].forEach((ex, index) => {
                const lastEntry = history.find(e => e.exercise === ex.name);
                const w = lastEntry?.weight || '--', rm = lastEntry?.warmup || '';
                const photo = exercisePhotos[ex.name];

                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${index}`;
                card.innerHTML = `
                    <div class="card-header" onclick="toggleCard(${index})">
                        <div class="health-left">
                            <div class="title">${ex.name}</div>
                            <div class="warmup-label">${rm ? `Размин: <b>${rm}</b> кг` : 'Разминка: --'}</div>
                        </div>
                        <div class="health-right">
                            <div class="weight-value">${w}<span class="weight-unit">кг</span></div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="card-top-actions">
                            <button class="action-link" onclick="editName(${index}, event)">${iconEdit} Название</button>
                            <button class="action-link" onclick="deleteExercise(${index}, event)">${iconTrash} Удалить</button>
                        </div>

                        <div class="input-grid">
                            <div class="input-wrapper"><label>Рабочий</label><input type="text" id="w-${index}" inputmode="decimal" placeholder="0"></div>
                            <div class="input-wrapper"><label>Разминка</label><input type="text" id="rm-${index}" inputmode="decimal" placeholder="0"></div>
                        </div>
                        <button class="btn-save" onclick="saveExercise('${ex.name}', 'w-${index}', 'rm-${index}')">Записать</button>

                        <div class="photo-section">
                            <div class="photo-container">
                                ${photo ? `<img src="${photo}"><button class="photo-remove" onclick="removePhoto('${ex.name}', event)">✕</button>` 
                                        : `<div class="photo-btn" onclick="uploadPhoto('${ex.name}')">${iconPhoto} Фото тренажера</div>`}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function addExercise() { const name = prompt("Название:"); if (name) { workouts[currentWorkout].push({ name }); saveState(); } }
        function editName(i, e) { e.stopPropagation(); const old = workouts[currentWorkout][i].name; const n = prompt("Новое название:", old); if (n) { if (exercisePhotos[old]) { exercisePhotos[n] = exercisePhotos[old]; delete exercisePhotos[old]; } workouts[currentWorkout][i].name = n; saveState(); localStorage.setItem('exercisePhotos', JSON.stringify(exercisePhotos)); } }
        function deleteExercise(i, e) { e.stopPropagation(); if (confirm("Удалить?")) { delete exercisePhotos[workouts[currentWorkout][i].name]; workouts[currentWorkout].splice(i, 1); saveState(); localStorage.setItem('exercisePhotos', JSON.stringify(exercisePhotos)); } }
        function removePhoto(n, e) { e.stopPropagation(); delete exercisePhotos[n]; localStorage.setItem('exercisePhotos', JSON.stringify(exercisePhotos)); render(); }
        function saveExercise(name, wId, rmId) { const wVal = document.getElementById(wId).value.trim(); const rmVal = document.getElementById(rmId).value.trim(); if (!wVal && !rmVal) return; const history = JSON.parse(localStorage.getItem('gymHistory2')) || []; const last = history.find(e => e.exercise === name); history.unshift({ exercise: name, weight: wVal || last?.weight || '-', warmup: rmVal || last?.warmup || '-', date: new Date().toLocaleDateString() }); localStorage.setItem('gymHistory2', JSON.stringify(history)); render(); }
        function saveState() { localStorage.setItem('customWorkouts', JSON.stringify(workouts)); render(); }
        function exportToFile() { const data = { h: localStorage.getItem('gymHistory2'), w: localStorage.getItem('customWorkouts'), p: localStorage.getItem('exercisePhotos') }; const blob = new Blob([JSON.stringify(data)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `gym_backup.json`; a.click(); }
        function importFromFile(event) { const file = event.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(e) { try { const d = JSON.parse(e.target.result); if (d.h) localStorage.setItem('gymHistory2', d.h); if (d.w) localStorage.setItem('customWorkouts', d.w); if (d.p) localStorage.setItem('exercisePhotos', d.p); location.reload(); } catch(err) { alert("Ошибка файла"); } }; reader.readAsText(file); }
        
        initTheme(); render();
    </script>
</body>
</html>
